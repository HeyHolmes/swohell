<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWOhell.com — NYC Stop Work Order Dashboard</title>
  <meta name="description" content="Real-time dashboard tracking a NYC Stop Work Order at 176 Johnson St, Brooklyn.">
  <meta property="og:title" content="SWOhell.com — NYC Stop Work Order Dashboard">
  <meta property="og:description" content="A first-time homeowner's transparent tracker through NYC DOB hell.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://swohell.com">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23ef4444'/><text x='50' y='62' text-anchor='middle' font-size='40' fill='white'>!</text></svg>">
  <style>
    :root{--bg:#f2f2f7;--bg-card:#fff;--border:#e5e5ea;--border-light:#f0f0f5;--text-primary:#1c1c1e;--text-secondary:#6e6e73;--text-muted:#aeaeb2;--track-a:#34c759;--track-b:#ff9f0a;--track-c:#007aff;--track-d:#ff3b30;--status-red:#ff3b30;--status-yellow:#ff9f0a;--status-green:#34c759;--status-gray:#8e8e93;--font-body:-apple-system,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;--font-heading:-apple-system,'SF Pro Display','Helvetica Neue',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,'Cascadia Code',monospace;--space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;--space-2xl:48px;--max-width:480px;--radius:16px;--radius-sm:12px;--radius-xs:8px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);line-height:1.45;font-size:16px;-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:var(--track-c);text-decoration:none}a:hover{text-decoration:underline}
    .container{max-width:var(--max-width);margin:0 auto;padding:0 var(--space-md)}
    .card{background:var(--bg-card);border-radius:var(--radius);padding:var(--space-lg);margin-bottom:var(--space-md)}.card--flush{padding:0}
    .section-label{font-family:var(--font-heading);font-size:22px;font-weight:700;margin:var(--space-xl) 0 var(--space-md)}
    .status-bar{background:var(--status-red);color:#fff;text-align:center;padding:var(--space-sm) var(--space-md);font-size:13px;font-weight:600;letter-spacing:.02em;position:sticky;top:0;z-index:100}
    .status-bar-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;margin-right:6px;animation:blink 2s ease-in-out infinite;vertical-align:middle}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .section-nav{position:sticky;top:33px;z-index:99;background:rgba(242,242,247,.85);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border)}
    .section-nav ul{display:flex;list-style:none;max-width:var(--max-width);margin:0 auto;padding:0 var(--space-md)}
    .section-nav a{display:block;padding:var(--space-sm) var(--space-md);font-size:13px;font-weight:500;color:var(--text-muted);white-space:nowrap}.section-nav a:hover{color:var(--text-primary);text-decoration:none}
    .hero-banner{width:100%;max-width:var(--max-width);margin:0 auto;display:block;border-radius:0 0 var(--radius) var(--radius);margin-top:0}
    .page-header{padding:var(--space-md) 0 var(--space-sm)}
    .page-title{font-family:var(--font-heading);font-size:34px;font-weight:700;letter-spacing:-.5px}
    .page-subtitle{font-size:15px;color:var(--text-secondary);margin-top:2px}
    .next-action{background:var(--text-primary);color:#fff;border-radius:var(--radius);padding:var(--space-lg);margin-bottom:var(--space-md)}
    .next-action-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5);margin-bottom:var(--space-xs)}
    .next-action-title{font-family:var(--font-heading);font-size:20px;font-weight:700;line-height:1.25;margin-bottom:var(--space-sm)}
    .next-action-detail{font-size:14px;color:rgba(255,255,255,.7);line-height:1.4}
    .next-action-owner{display:inline-block;margin-top:var(--space-md);font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
    .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin-bottom:var(--space-md)}
    .stat-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:var(--space-md) var(--space-lg)}
    .stat-label{font-size:13px;color:var(--text-secondary)}.stat-value{font-family:var(--font-heading);font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:2px}.stat-value--red{color:var(--status-red)}.stat-value--small{font-size:20px}.stat-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
    .kd-list{list-style:none}.kd-item{position:relative;padding-left:44px;padding-bottom:var(--space-lg)}.kd-item:last-child{padding-bottom:0}
    .kd-item::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:2px;background:var(--border)}.kd-item:last-child::before{display:none}
    .kd-dot{position:absolute;left:6px;top:2px;width:20px;height:20px;border-radius:50%;z-index:1}
    .kd-dot--today{background:var(--text-primary)}.kd-dot--red{background:var(--status-red)}.kd-dot--yellow{background:var(--status-yellow)}.kd-dot--blue{background:var(--track-c)}.kd-dot--green{background:var(--status-green)}
    .kd-date{font-family:var(--font-heading);font-size:17px;font-weight:600}.kd-label{font-size:14px;color:var(--text-secondary);margin-top:2px;line-height:1.35}
    .kd-countdown{font-family:var(--font-mono);font-size:12px;margin-top:4px;display:inline-block;padding:2px 8px;border-radius:4px}
    .kd-countdown--red{background:rgba(255,59,48,.1);color:var(--status-red)}.kd-countdown--yellow{background:rgba(255,159,10,.1);color:var(--status-yellow)}.kd-countdown--blue{background:rgba(0,122,255,.1);color:var(--track-c)}.kd-countdown--green{background:rgba(52,199,89,.1);color:var(--status-green)}
    .txn-header{display:flex;justify-content:space-between;align-items:baseline;padding:var(--space-lg) var(--space-lg) var(--space-md)}
    .txn-title{font-family:var(--font-heading);font-size:22px;font-weight:700}.txn-total{font-family:var(--font-heading);font-size:17px;font-weight:600;color:var(--status-red)}
    .txn-item{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md) var(--space-lg);border-top:1px solid var(--border-light)}
    .txn-icon{width:40px;height:40px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .txn-icon--paid{background:rgba(52,199,89,.12)}.txn-icon--pending{background:rgba(255,159,10,.12)}.txn-icon--unknown{background:rgba(255,59,48,.12)}
    .txn-info{flex:1;min-width:0}.txn-name{font-size:15px;font-weight:500}.txn-detail{font-size:13px;color:var(--text-secondary);margin-top:1px}
    .txn-amount-wrap{text-align:right;flex-shrink:0}.txn-amount{font-family:var(--font-heading);font-size:15px;font-weight:600}.txn-status{font-size:12px;margin-top:1px}
    .txn-status--paid{color:var(--status-green)}.txn-status--pending{color:var(--status-yellow)}.txn-status--unknown{color:var(--status-red)}
    .numbers-item{padding:var(--space-md) var(--space-lg);border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:baseline}.numbers-item:first-child{border-top:none}
    .numbers-label{font-size:15px}.numbers-value{font-family:var(--font-heading);font-size:15px;font-weight:600}.numbers-value--red{color:var(--status-red)}
    .blocker-item{padding:var(--space-md) var(--space-lg);border-top:1px solid var(--border-light);display:flex;gap:var(--space-md);align-items:flex-start}.blocker-item:first-child{border-top:none}
    .blocker-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .blocker-dot--red{background:var(--status-red)}.blocker-dot--yellow{background:var(--status-yellow)}.blocker-dot--gray{background:var(--status-gray)}
    .blocker-name{font-size:15px;font-weight:500}.blocker-detail{font-size:13px;color:var(--text-secondary);margin-top:2px}.blocker-owner{font-size:12px;color:var(--text-muted);margin-top:2px}
    .tl-legend{display:flex;flex-wrap:wrap;gap:var(--space-sm) var(--space-md);margin-bottom:var(--space-lg);font-size:13px;color:var(--text-secondary)}
    .tl-legend-item{display:flex;align-items:center;gap:4px}.tl-legend-dot{width:8px;height:8px;border-radius:50%}
    .tl-legend-dot--a{background:var(--track-a)}.tl-legend-dot--b{background:var(--track-b)}.tl-legend-dot--c{background:var(--track-c)}.tl-legend-dot--d{background:var(--track-d)}
    .tl-zone-label{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:var(--space-md);margin-top:var(--space-lg)}
    .tl-list{list-style:none}.tl-entry{position:relative;padding-left:28px;padding-bottom:var(--space-md)}
    .tl-entry::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border)}.tl-entry:last-child::before{display:none}
    .tl-node{position:absolute;left:0;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid var(--text-muted);background:var(--bg);z-index:1}
    .tl-date{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);font-weight:500}
    .tl-track{font-size:11px;font-weight:600;padding:1px 6px;border-radius:4px;margin-left:var(--space-sm)}
    .tl-desc{font-size:15px;line-height:1.4;margin-top:2px}.tl-owner{font-size:13px;color:var(--text-muted);margin-top:2px;display:block}
    .tl-step{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
    .tl-status-badge{font-size:11px;font-weight:600;padding:1px 6px;border-radius:4px;margin-left:var(--space-sm)}
    .tl-dep{font-size:12px;color:var(--text-muted);font-style:italic;display:block;margin-top:2px}
    [data-track="a"] .tl-track,[data-track="a-b"] .tl-track{background:rgba(52,199,89,.12);color:var(--track-a)}
    [data-track="b"] .tl-track{background:rgba(255,159,10,.12);color:var(--track-b)}[data-track="b-c"] .tl-track{background:rgba(255,159,10,.12);color:var(--track-b)}
    [data-track="c"] .tl-track{background:rgba(0,122,255,.12);color:var(--track-c)}[data-track="d"] .tl-track{background:rgba(255,59,48,.12);color:var(--track-d)}
    [data-track="none"] .tl-track{background:rgba(142,142,147,.12);color:var(--text-muted)}
    .tl-done [data-track="a"] .tl-node,.tl-done [data-track="a-b"] .tl-node{border-color:var(--track-a);background:var(--track-a)}
    .tl-done [data-track="b"] .tl-node{border-color:var(--track-b);background:var(--track-b)}.tl-done [data-track="b-c"] .tl-node{border-color:var(--track-b);background:var(--track-b)}
    .tl-done [data-track="c"] .tl-node{border-color:var(--track-c);background:var(--track-c)}.tl-done [data-track="d"] .tl-node{border-color:var(--track-d);background:var(--track-d)}
    .tl-done [data-track="none"] .tl-node{border-color:var(--text-muted);background:var(--text-muted)}
    .tl-todo [data-track="b"] .tl-node{border-color:var(--track-b)}.tl-todo [data-track="b-c"] .tl-node{border-color:var(--track-b)}
    .tl-todo [data-track="c"] .tl-node{border-color:var(--track-c)}.tl-todo [data-track="d"] .tl-node{border-color:var(--track-d)}
    .tl-todo .tl-entry::before{background:none;border-left:2px dashed var(--border);width:0}
    .tl-status-badge--next{background:rgba(255,59,48,.1);color:var(--status-red)}.tl-status-badge--pending{background:rgba(255,159,10,.1);color:var(--status-yellow)}
    .tl-status-badge--unknown{background:rgba(255,59,48,.1);color:var(--status-red)}.tl-status-badge--waiting{background:rgba(0,122,255,.1);color:var(--track-c)}
    .tl-status-badge--blocked{background:rgba(142,142,147,.1);color:var(--status-gray)}.tl-status-badge--unanswered{background:rgba(255,159,10,.1);color:var(--status-yellow)}
    .tl-status-badge--goal{background:rgba(255,59,48,.1);color:var(--status-red)}
    .tl-divider{position:relative;padding:var(--space-lg) 0;padding-left:28px}
    .tl-divider::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border)}
    .tl-divider-inner{display:flex;align-items:center;gap:var(--space-sm)}
    .tl-divider-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--status-red);white-space:nowrap}
    .tl-divider-line{flex:1;height:1px;background:var(--status-red);opacity:.25}
    .tl-entry--goal .tl-node{width:16px;height:16px;left:-2px;border-width:3px;border-color:var(--track-d);animation:pulse 2.5s ease-in-out infinite}
    .tl-entry--goal .tl-desc{font-size:17px;font-weight:700;color:var(--track-d)}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.25)}50%{box-shadow:0 0 0 6px rgba(255,59,48,0)}}
    .team-item{padding:var(--space-md) var(--space-lg);border-top:1px solid var(--border-light);display:flex;gap:var(--space-md);align-items:center}.team-item:first-child{border-top:none}
    .team-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--text-secondary);flex-shrink:0}
    .team-info{flex:1;min-width:0}.team-name{font-size:15px;font-weight:500}.team-role{font-size:13px;color:var(--text-secondary)}.team-status{font-size:12px;color:var(--text-muted);margin-top:2px}
    details{background:var(--bg-card);border-radius:var(--radius-sm);margin-bottom:var(--space-sm);overflow:hidden}
    summary{padding:var(--space-md) var(--space-lg);cursor:pointer;font-size:15px;font-weight:600;user-select:none;list-style:none;display:flex;align-items:center;justify-content:space-between}
    summary::-webkit-details-marker{display:none}summary::after{content:'+';font-size:20px;font-weight:300;color:var(--text-muted);line-height:1}details[open] summary::after{content:'\2212'}
    .guide-content{padding:0 var(--space-lg) var(--space-lg)}
    .flow-list{list-style:none}.flow-step{position:relative;padding-left:28px;padding-bottom:var(--space-md)}
    .flow-step::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)}.flow-step:last-child::before{display:none}
    .flow-step-icon{position:absolute;left:0;top:0;font-size:14px}.flow-step-text{font-size:14px}.flow-step-note{font-size:12px;color:var(--text-muted);display:block;margin-top:2px}
    .contact-item{padding:var(--space-md) 0;border-top:1px solid var(--border-light)}.contact-item:first-child{border-top:none}
    .contact-name{font-size:15px;font-weight:500}.contact-phone{font-family:var(--font-mono);font-size:14px;color:var(--track-c)}.contact-email{font-size:13px;color:var(--track-c)}.contact-desc{font-size:13px;color:var(--text-secondary);margin-top:2px}
    .tip-item{padding:var(--space-md) 0;border-top:1px solid var(--border-light)}.tip-item:first-child{border-top:none}
    .tip-number{font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}.tip-title{font-size:15px;font-weight:600;display:block;margin-top:2px}.tip-body{font-size:14px;color:var(--text-secondary);line-height:1.45;margin-top:4px}
    .property-detail-row{padding:var(--space-sm) var(--space-lg);display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--border-light);font-size:14px}.property-detail-row:first-child{border-top:none}
    .property-key{color:var(--text-secondary)}.property-val{font-weight:500;text-align:right}
    .property-sub-header{padding:var(--space-md) var(--space-lg) var(--space-xs);font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;border-top:1px solid var(--border-light)}
    .site-footer{padding:var(--space-xl) 0 var(--space-2xl);text-align:center}
    .footer-quote{font-size:15px;color:var(--text-secondary);font-style:italic;margin-bottom:var(--space-md)}.footer-credit{font-size:13px;color:var(--text-muted);line-height:1.5}.footer-updated{font-size:12px;color:var(--text-muted);margin-top:var(--space-sm);font-family:var(--font-mono)}
    @media(min-width:520px){:root{--max-width:520px}}@media(min-width:768px){:root{--max-width:600px}}
  </style>
</head>
<body>
  <div class="status-bar"><span class="status-bar-dot"></span><span id="status-headline">Loading...</span></div>
  <nav class="section-nav" aria-label="Sections"><ul>
    <li><a href="#key-dates">Key Dates</a></li><li><a href="#timeline">Timeline</a></li><li><a href="#transactions">Payments</a></li>
    <li><a href="#blockers">Blockers</a></li><li><a href="#team">Team</a></li><li><a href="#survival-guide">Guide</a></li>
  </ul></nav>
  <div class="container">
    <img src="banner.PNG" alt="Allan and Charlie in a burning toy factory — claymation style" class="hero-banner">
    <header class="page-header"><h1 class="page-title">SWO Hell</h1><p class="page-subtitle">Project Tracker to make sure everyone is aligned so Allan and Charlie can go home again</p></header>
    <div id="next-action-slot"></div>
    <div id="stats-slot"></div>
    <div id="key-dates-slot"></div>
    <div id="transactions-slot"></div>
    <div id="blockers-slot"></div>
    <div id="timeline-slot"></div>
    <div id="team-slot"></div>
    <div id="guide-slot"></div>
    <div id="property-slot"></div>
  </div>
  <footer class="site-footer"><div class="container">
    <p class="footer-quote" id="footer-quote"></p>
    <p class="footer-credit" id="footer-credit"></p>
    <p class="footer-updated">Last updated <span id="last-updated"></span></p>
  </div></footer>
  <script>
  (function(){
    var now=new Date(),fmt={month:'long',day:'numeric',year:'numeric'},fmtS={month:'short',day:'numeric'};
    function dB(a,b){return Math.ceil((b-a)/864e5)}
    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function row(k,v){return'<div class="property-detail-row"><span class="property-key">'+esc(k)+'</span><span class="property-val">'+esc(v)+'</span></div>'}

    fetch('data.json?v='+Date.now()).then(function(r){return r.json()}).then(render).catch(function(e){
      document.getElementById('next-action-slot').innerHTML='<div class="card" style="text-align:center;color:var(--text-muted)">Failed to load data: '+esc(e.message)+'</div>';
    });

    function render(d){
      document.getElementById('status-headline').textContent=d.status.headline;
      var swoDate=new Date(d.status.swoDate+'T00:00:00'),daysSince=Math.max(0,dB(swoDate,now));

      // Next action
      document.getElementById('next-action-slot').innerHTML='<div class="next-action"><div class="next-action-eyebrow">Next Action Required</div><div class="next-action-title">'+esc(d.nextAction.title)+'</div><div class="next-action-detail">'+esc(d.nextAction.detail)+'</div><div class="next-action-owner">'+esc(d.nextAction.owner)+'</div></div>';

      // Stats
      document.getElementById('stats-slot').innerHTML='<div class="stats-row"><div class="stat-card"><div class="stat-label">Days Halted</div><div class="stat-value stat-value--red">'+daysSince+'</div><div class="stat-sub">since '+swoDate.toLocaleDateString('en-US',fmtS)+'</div></div><div class="stat-card"><div class="stat-label">Next Deadline</div><div class="stat-value stat-value--small">'+esc(d.status.nextDeadline)+'</div><div class="stat-sub">'+esc(d.status.nextDeadlineLabel)+'</div></div></div>';

      // Key dates
      var h='<div class="card" id="key-dates"><div style="font-family:var(--font-heading);font-size:17px;font-weight:600;margin-bottom:var(--space-lg)">Key Dates</div><ol class="kd-list">';
      h+='<li class="kd-item"><div class="kd-dot kd-dot--today"></div><div class="kd-date">Today — '+now.toLocaleDateString('en-US',fmtS)+'</div><div class="kd-label">Day '+daysSince+' of Stop Work Order</div></li>';
      d.keyDates.forEach(function(k){
        h+='<li class="kd-item"><div class="kd-dot kd-dot--'+k.color+'"></div><div class="kd-date">'+esc(k.label)+'</div><div class="kd-label">'+esc(k.desc)+'</div>';
        if(k.countdown&&k.date){var dt=dB(now,new Date(k.date+'T00:00:00'));h+='<span class="kd-countdown kd-countdown--'+k.color+'">'+(dt>0?dt+' days away':dt===0?'Today':Math.abs(dt)+' days ago')+'</span>';}
        h+='</li>';
      });
      h+='</ol></div>';
      document.getElementById('key-dates-slot').innerHTML=h;

      // Transactions
      var paidTotal=0;d.penalties.forEach(function(p){if(p.status==='paid')paidTotal+=p.amountNum});
      var rentTotal=0;d.rent.weeks.forEach(function(w){rentTotal+=w.amount});
      var oopTotal=paidTotal+rentTotal;
      h='<div class="card card--flush" id="transactions"><div class="txn-header"><div class="txn-title">Penalties &amp; Fees</div><div class="txn-total">$'+paidTotal.toLocaleString()+'+</div></div>';
      d.penalties.forEach(function(p){
        h+='<div class="txn-item"><div class="txn-icon txn-icon--'+p.status+'">'+p.icon+'</div><div class="txn-info"><div class="txn-name">'+esc(p.name)+'</div><div class="txn-detail">'+esc(p.detail)+'</div></div><div class="txn-amount-wrap"><div class="txn-amount"'+(p.status==='unknown'?' style="color:var(--status-red)"':'')+'>'+esc(p.amount)+'</div><div class="txn-status txn-status--'+p.status+'">'+(p.status==='paid'?'Paid':p.status==='pending'?'Pending':'Unknown')+(p.who?' · '+esc(p.who):'')+'</div></div></div>';
      });
      h+='<div class="txn-header" style="border-top:1px solid var(--border-light);padding-top:var(--space-lg)"><div class="txn-title">Displacement Rent</div><div class="txn-total">$'+rentTotal.toLocaleString()+'</div></div>';
      h+='<div style="padding:0 var(--space-lg) var(--space-sm);font-size:13px;color:var(--text-secondary)">'+esc(d.rent.description)+'</div>';
      d.rent.weeks.forEach(function(w){
        h+='<div class="txn-item"><div class="txn-icon txn-icon--paid">🏠</div><div class="txn-info"><div class="txn-name">'+esc(w.label)+'</div><div class="txn-detail">'+esc(w.dates)+'</div></div><div class="txn-amount-wrap"><div class="txn-amount">$'+w.amount+'</div><div class="txn-status txn-status--paid">Paid · Allan &amp; Charlie</div></div></div>';
      });
      h+='</div>';
      h+='<div class="card card--flush"><div class="numbers-item" style="padding-top:var(--space-lg)"><span class="numbers-label" style="font-weight:600">Total Out-of-Pocket Cost</span><span class="numbers-value numbers-value--red">$'+oopTotal.toLocaleString()+'</span></div>';
      h+='<div class="numbers-item" style="padding-bottom:var(--space-lg)"><span class="numbers-label" style="font-size:13px;color:var(--text-muted)">Penalties + displacement rent paid by Allan &amp; Charlie</span><span class="numbers-value"></span></div></div>';
      document.getElementById('transactions-slot').innerHTML=h;

      // Blockers
      h='<h2 class="section-label" id="blockers">Blockers</h2><div class="card card--flush">';
      d.blockers.forEach(function(b){h+='<div class="blocker-item"><div class="blocker-dot blocker-dot--'+b.severity+'"></div><div><div class="blocker-name">'+esc(b.name)+'</div><div class="blocker-detail">'+esc(b.detail)+'</div><div class="blocker-owner">'+esc(b.owner)+'</div></div></div>';});
      h+='</div>';document.getElementById('blockers-slot').innerHTML=h;

      // Timeline
      h='<h2 class="section-label" id="timeline">Timeline</h2><div class="tl-legend">';
      h+='<div class="tl-legend-item"><span class="tl-legend-dot tl-legend-dot--a"></span> Electrical <span style="color:var(--track-a);font-weight:600;font-size:11px">DONE</span></div>';
      h+='<div class="tl-legend-item"><span class="tl-legend-dot tl-legend-dot--b"></span> Construction</div>';
      h+='<div class="tl-legend-item"><span class="tl-legend-dot tl-legend-dot--c"></span> SWO Rescission</div>';
      h+='<div class="tl-legend-item"><span class="tl-legend-dot tl-legend-dot--d"></span> Restart</div></div>';
      h+='<div class="card" style="padding:var(--space-lg)"><div class="tl-zone-label">Completed</div><ol class="tl-list tl-done">';
      d.timelineDone.forEach(function(e){
        h+='<li class="tl-entry" data-track="'+e.track+'"><div class="tl-node"></div><div><span class="tl-date">'+esc(e.date)+'</span><span class="tl-track">'+esc(e.trackLabel)+'</span></div><p class="tl-desc">'+e.desc+'</p><span class="tl-owner">'+esc(e.owner)+'</span></li>';
      });
      h+='</ol><div class="tl-divider"><div class="tl-divider-inner"><span class="tl-divider-label">Today — '+now.toLocaleDateString('en-US',fmt)+'</span><div class="tl-divider-line"></div></div></div>';
      h+='<div class="tl-zone-label">Remaining Steps</div><ol class="tl-list tl-todo">';
      d.timelineTodo.forEach(function(e){
        var g=e.status==='goal';
        h+='<li class="tl-entry'+(g?' tl-entry--goal':'')+'" data-track="'+e.track+'"><div class="tl-node"></div><div><span class="tl-step">#'+e.step+'</span><span class="tl-track">'+esc(e.trackLabel)+'</span>';
        if(!g)h+='<span class="tl-status-badge tl-status-badge--'+e.status+'">'+esc(e.status.charAt(0).toUpperCase()+e.status.slice(1))+'</span>';
        h+='</div><p class="tl-desc">'+esc(e.desc)+'</p><span class="tl-owner">'+esc(e.owner)+'</span>';
        if(e.dep)h+='<span class="tl-dep">'+esc(e.dep)+'</span>';
        h+='</li>';
      });
      h+='</ol></div>';document.getElementById('timeline-slot').innerHTML=h;

      // Team
      h='<h2 class="section-label" id="team">Team</h2><div class="card card--flush">';
      d.team.forEach(function(t){h+='<div class="team-item"><div class="team-avatar">'+esc(t.initials)+'</div><div class="team-info"><div class="team-name">'+esc(t.name)+'</div><div class="team-role">'+esc(t.role)+'</div><div class="team-status">'+esc(t.status)+'</div></div></div>';});
      h+='</div>';document.getElementById('team-slot').innerHTML=h;

      // Survival guide
      var sg=d.survivalGuide;
      h='<h2 class="section-label" id="survival-guide">SWO Survival Guide</h2><p style="color:var(--text-secondary);font-size:14px;margin-bottom:var(--space-md)">For other NYC homeowners going through this. Everything we learned the hard way.</p>';
      h+='<details><summary>Process Flowchart</summary><div class="guide-content"><ol class="flow-list">';
      sg.flowchart.forEach(function(f){h+='<li class="flow-step"><span class="flow-step-icon">'+f.icon+'</span><span class="flow-step-text">'+f.text+'</span>'+(f.note?'<span class="flow-step-note">'+esc(f.note)+'</span>':'')+'</li>';});
      h+='</ol><p style="margin-top:var(--space-md);padding:var(--space-md);background:rgba(0,122,255,.06);border-radius:var(--radius-xs);font-size:14px;color:var(--track-c)"><strong>Key insight:</strong> '+esc(sg.keyInsight)+'</p></div></details>';
      h+='<details><summary>Who To Call</summary><div class="guide-content">';
      sg.contacts.forEach(function(c){h+='<div class="contact-item"><div class="contact-name">'+esc(c.name)+'</div><div class="contact-phone">'+esc(c.phone)+'</div>'+(c.email?'<div class="contact-email">'+esc(c.email)+'</div>':'')+'<div class="contact-desc">'+esc(c.desc)+'</div></div>';});
      h+='<p style="margin-top:var(--space-md);font-size:12px;color:var(--text-muted)">Hours: M–F 8:30 AM – 4:30 PM unless noted</p></div></details>';
      h+='<details><summary>10 Things I Learned</summary><div class="guide-content">';
      sg.tips.forEach(function(t,i){h+='<div class="tip-item"><div class="tip-number">'+String(i+1).padStart(2,'0')+'</div><span class="tip-title">'+esc(t.title)+'</span><span class="tip-body">'+esc(t.body)+'</span></div>';});
      h+='</div></details>';document.getElementById('guide-slot').innerHTML=h;

      // Property
      var p=d.property;h='<h2 class="section-label" id="property">Property Details</h2><div class="card card--flush">';
      h+='<div class="property-sub-header">Property</div>'+row('Address',p.address)+row('BIN',p.bin)+row('Block / Lot',p.blockLot)+row('Job Filing',p.jobFiling);
      p.violations.forEach(function(v){
        h+='<div class="property-sub-header">'+esc(v.label)+' <span style="color:var(--track-'+(v.statusColor==='green'?'a':'b')+');font-weight:700">'+esc(v.status)+'</span></div>';
        h+=row('Summons',v.summons)+row('COC',v.coc)+row('Penalty',v.penalty);if(v.deadline)h+=row('Deadline',v.deadline);
      });
      h+='<div class="property-sub-header">Professionals</div>';p.professionals.forEach(function(pr){h+=row(pr.role,pr.name)});
      h+='</div>';document.getElementById('property-slot').innerHTML=h;

      // Footer
      document.getElementById('footer-quote').innerHTML='\u201c'+esc(d.footer.quote)+'\u201d';
      document.getElementById('footer-credit').innerHTML=d.footer.credit+'<br><a href="mailto:'+esc(d.footer.email)+'">'+esc(d.footer.email)+'</a>';
      document.getElementById('last-updated').textContent=now.toLocaleDateString('en-US',fmt);
    }
  })();
  </script>
</body>
</html>
